# Per-company wiring (SPEC §6). Validated by zod, fail-fast on unknown modules/roles.
# Onboard a real company with: npm run create-company  (see docs/onboarding-company.md).
company:
  id: acme
  name: Acme Corp
  enabledModules:
    - hr.recruitment
  roles:
    - hr_admin
    - manager
    - employee
resources:
  # Share all three (folder, template Doc, Sheet) with the service-account email (edit).
  googleDrive:
    # Shared Drive folder where job-description docs are created (they inherit its sharing).
    # Required for live Docs (GOOGLE_CONNECTORS=live); leave "" to keep Docs simulated.
    hrKnowledgeFolderId: ""
  googleSheets:
    # Recruitment tracking sheet. Needs a "rec_jobDesc" tab (id | titre | mgr | url | status)
    # and a "Config" tab (key | value). Both are created by: npm run setup-company-sheet.
    hrRecruitmentSheetId: "1VhEeiLsix8Dk8Jwo1Hvh2zHcWbf3PBTfJPJWmK8DL-M"
  googleDocs:
    # Template Doc copied per fiche; supports {{TITLE}} / {{SUMMARY}} / {{BODY}} placeholders.
    # Required for live Docs (GOOGLE_CONNECTORS=live); leave "" to keep Docs simulated.
    jobDescriptionTemplateId: ""
